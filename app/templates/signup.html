{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <article class="card auth-card">
        <h1>Faculty Onboarding</h1>
        <p class="muted">Join the Campus Sync network to manage your academic presence and scheduling requirements.</p>
        
        <form method="post" class="form">
            <label>Full Legal Name
                <input type="text" name="name" placeholder="John Doe" required>
            </label>
            <label>Academic Email
                <input type="email" name="email" placeholder="faculty@university.edu" required>
            </label>
            <label>Security Key
                <input type="password" name="password" placeholder="Minimum 8 characters" required>
            </label>
            <button type="submit" class="hover-scale">Register Identity</button>
        </form>

        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p class="muted">Already registered? <a href="{{ url_for('main.login') }}" class="text-link">Return to Portal</a></p>
        </div>
    </article>
</section>
{% endblock %}
